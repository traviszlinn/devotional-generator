<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devotional Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    font-family: 'Montserrat', sans-serif;
    color: #fff;
    min-height: 100vh;
    padding: 24px 16px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 20px;
  }

  .controls {
    width: 100%;
    max-width: 390px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }

  .tab-row { display: flex; gap: 8px; }

  .tab {
    flex: 1;
    padding: 10px;
    background: #222;
    border: 1px solid #333;
    border-radius: 8px;
    color: #666;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab.active { background: #fff; color: #000; border-color: #fff; }

  textarea {
    width: 100%;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 12px 14px;
    resize: vertical;
    min-height: 110px;
    letter-spacing: 0.02em;
    line-height: 1.5;
  }
  textarea::placeholder { color: #333; }
  textarea:focus { outline: none; border-color: #444; }

  .ref-input { min-height: unset !important; height: 44px; resize: none; }

  button.generate {
    width: 100%;
    padding: 13px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 8px;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button.generate:hover { opacity: 0.85; }

  .canvas-wrap {
    width: 100%;
    max-width: 390px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  #noteCanvas {
    width: 100%;
    max-width: 390px;
    height: auto;
    display: block;
    touch-action: manipulation;
  }

  .hint {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #444;
    text-align: center;
  }
</style>
</head>
<body>

<h1>Devotional Generator</h1>

<div class="controls">
  <div class="tab-row">
    <button class="tab active" id="tab-scripture" onclick="setMode('scripture')">Scripture</button>
    <button class="tab" id="tab-notes" onclick="setMode('notes')">Notes</button>
  </div>
  <textarea id="mainText" placeholder="ENTER TEXT HERE..." rows="6"></textarea>
  <textarea id="refText" class="ref-input" placeholder="PSALM 3:3-4 ESV" rows="1"></textarea>
  <button class="generate" onclick="drawCanvas()">Generate</button>
</div>

<div class="canvas-wrap">
  <canvas id="noteCanvas"></canvas>
  <p class="hint" id="hint" style="display:none;">Hold down on image to save · On desktop: right-click → Save</p>
</div>

<script>
  let currentMode = 'scripture';

  // Canvas dimensions — iPhone proportions
  const CW = 1170;
  const CH = 2532;
  const S = 3; // scale factor (390 * 3 = 1170)

  function setMode(mode) {
    currentMode = mode;
    document.getElementById('tab-scripture').classList.toggle('active', mode === 'scripture');
    document.getElementById('tab-notes').classList.toggle('active', mode === 'notes');
  }

  function wrapText(ctx, text, maxWidth) {
    const words = text.split(' ');
    const lines = [];
    let current = '';
    for (const word of words) {
      const test = current ? current + ' ' + word : word;
      if (ctx.measureText(test).width > maxWidth && current) {
        lines.push(current);
        current = word;
      } else {
        current = test;
      }
    }
    if (current) lines.push(current);
    return lines;
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawCanvas() {
    const text = document.getElementById('mainText').value.trim();
    const ref = document.getElementById('refText').value.trim();
    if (!text) return;

    document.fonts.ready.then(() => {
      const canvas = document.getElementById('noteCanvas');
      canvas.width = CW;
      canvas.height = CH;
      const ctx = canvas.getContext('2d');

      // Background
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, CW, CH);

      // ── NAV BAR ──
      // Back chevron
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2.2 * S;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(30 * S, 40 * S);
      ctx.lineTo(22 * S, 48 * S);
      ctx.lineTo(30 * S, 56 * S);
      ctx.stroke();

      // "Notes" text
      ctx.fillStyle = '#ffffff';
      ctx.font = `700 ${17 * S}px Montserrat, sans-serif`;
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'left';
      ctx.fillText('Notes', 37 * S, 48 * S);

      // Plus-in-rect icon (top right)
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1.6 * S;
      const rix = 330 * S, riy = 38 * S, rsz = 20 * S;
      roundRect(ctx, rix, riy, rsz, rsz, 2 * S);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(rix + rsz/2, riy + 4 * S);
      ctx.lineTo(rix + rsz/2, riy + rsz - 4 * S);
      ctx.moveTo(rix + 4 * S, riy + rsz/2);
      ctx.lineTo(rix + rsz - 4 * S, riy + rsz/2);
      ctx.stroke();

      // Three dots icon
      ctx.fillStyle = '#ffffff';
      const dx = 364 * S, dy = 48 * S;
      [-8, 0, 8].forEach(offset => {
        ctx.beginPath();
        ctx.arc(dx, dy + offset * S, 2 * S, 0, Math.PI * 2);
        ctx.fill();
      });

      // ── CONTENT ──
      const upperText = text.toUpperCase();
      const upperRef = ref ? ref.toUpperCase() : '';

      const marginX = 52 * S;
      const maxWidth = CW - marginX * 2;
      const contentTop = 80 * S;
      const contentBottom = CH - 60 * S;
      const contentH = contentBottom - contentTop;

      const fontSize = currentMode === 'scripture' ? 25 * S : 19 * S;
      const lineH = fontSize * (currentMode === 'scripture' ? 1.35 : 1.34);
      const refFontSize = 17 * S;
      const refLineH = refFontSize * 1.4;

      ctx.font = `700 ${fontSize}px Montserrat, sans-serif`;
      ctx.fillStyle = '#ffffff';
      ctx.textBaseline = 'top';
      ctx.textAlign = 'left';

      const lines = wrapText(ctx, upperText, maxWidth);
      const totalTextH = lines.length * lineH;
      const refBlockH = upperRef ? (12 * S + refLineH) : 0;
      const totalH = totalTextH + refBlockH;

      let startY;
      if (currentMode === 'scripture') {
        startY = contentTop + (contentH - totalH) / 2;
      } else {
        startY = contentTop + 16 * S;
      }

      lines.forEach((line, i) => {
        ctx.fillText(line, marginX, startY + i * lineH);
      });

      if (upperRef) {
        ctx.font = `700 ${refFontSize}px Montserrat, sans-serif`;
        ctx.fillText(upperRef, marginX, startY + totalTextH + 12 * S);
      }

      // Show hint
      document.getElementById('hint').style.display = 'block';
    });
  }

  // Auto-load sample on start
  window.onload = () => {
    document.getElementById('mainText').value = '"BUT YOU, O LORD, ARE A SHIELD ABOUT ME, MY GLORY, AND THE LIFTER OF MY HEAD. I CRIED ALOUD TO THE LORD, AND HE ANSWERED ME FROM HIS HOLY HILL. SELAH"';
    document.getElementById('refText').value = 'PSALM 3:3-4 ESV';
    drawCanvas();
  };
</script>
</body>
</html>
